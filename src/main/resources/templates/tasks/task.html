<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container">
    <form class="mt-3" th:action="@{/tasks/edit/{id}(id=${task.id})}" method="post" th:object="${task}"
          enctype="multipart/form-data">
        <input type="hidden" name="id" th:field="*{id}">
        <input type="hidden" th:field="*{done}">
        <div class="mb-3">
            <label for="name" class="form-label"><b>Title</b></label>
            <input type="text" class="form-control" id="name" name="name"
            th:field="*{name}"
            placeholder="Task title">
        </div>
        <div class="mb-3">
            <label for="description" class="form-label"><b>Description</b></label>
            <textarea class="form-control" id="description" name="description"
                      th:field="*{description}" rows="5" placeholder="Task description"></textarea>
        </div>
        <div class="mb-3">
            <label for="priority"><b>Priority</b></label>
            <select class="form-control" id="priority" th:field="*{priority.id}">
                <option th:each="priority : ${priorities}"
                        th:value="${priority.id}"
                        th:text="${priority.name}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label"><b>Categories</b></label>
            <div class="form-check" th:each="category : ${categories}">
                <input class="form-check-input"
                       type="checkbox"
                       name="categoryIds"
                       th:id="'category-' + ${category.id}"
                       th:value="${category.id}">
                <label class="form-check-label"
                       th:for="'category-' + ${category.id}"
                       th:text="${category.name}">
                </label>
            </div>
        </div>
        <div class="mb-3 row">
            <div class="col-6"></div>
            <div class="col-6">
                <div class="row">

                    <div class="col-4">
                        <button class="btn btn-success w-100" type="submit">Edit</button>
                    </div>
                    <div class="col-4">
                        <a class="btn btn-primary w-100"
                           th:href="@{/tasks/doneTask/{id}(id=${task.id})}" >Complete</a>
                    </div>
                    <div class="col-4"><a class="btn btn-danger w-100"
                                          th:href="@{/tasks/delete/{id}(id=${task.id})}">Delete</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
