<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container">
    <form class="mt-3" th:action="@{/tasks/create}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="name" class="form-label"><b>Title</b></label>
            <textarea class="form-control" id="name" name="name" rows="1"
                   placeholder="Task title"></textarea>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label"><b>Description</b></label>
            <textarea class="form-control" id="description" name="description" rows="5"
                      placeholder="Task description"></textarea>
        </div>
        <div class="mb-3">
            <label for="priority"><b>Priority</b></label>
            <select class="form-control" id="priority" name="priority.id">
                <option th:each="priority : ${priorities}"
                        th:value="${priority.id}" th:text="${priority.name}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label"><b>Categories</b></label>
            <div class="form-check" th:each="category : ${categories}">
                <input class="form-check-input"
                       type="checkbox"
                       name="categoryIds"
                       th:id="'category-' + ${category.id}"
                       th:value="${category.id}">
                <label class="form-check-label"
                       th:for="'category-' + ${category.id}"
                       th:text="${category.name}">
                </label>
            </div>
        </div>
        <div class="mb-3 row">
            <div class="col-6"></div>
            <div class="col-6">
                <div class="row">
                    <div class="col-6"><a class="btn btn-danger w-100" th:href="@{/tasks/list}">Cancel</a> </div>
                    <div class="col-6"><button class="btn btn-primary w-100" type="submit">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
